name: Tests & Linting

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Run prek lint checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install prek
        run: |
          python -m pip install --upgrade pip
          python -m pip install prek

      - name: Run prek (root)
        run: prek run --all-files
