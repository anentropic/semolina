[project]
name = "django-semantic-layer"
version = "0.1.0"
description = "A Python \"OAM\" (Object Analytics Model) for data warehouse Semantic Layer backends."
readme = "README.md"
authors = [
    { name = "Anentropic", email = "ego@anentropic.com" }
]
requires-python = ">=3.10"  # Django 5.2 LTS until Apr 2028 supports Python 3.10+
dependencies = []

[project.optional-dependencies]
databricks = [
    "databricks-sql-connector[pyarrow]>=4.2.5",
]
snowflake = [
    "snowflake-connector-python>=4.3.0",
]

[build-system]
requires = ["uv_build>=0.9.18,<0.11.0"]
build-backend = "uv_build"
