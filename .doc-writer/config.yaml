# .doc-writer/config.yaml — generated by /doc-writer:setup
version: 1

plugin_version: "1.6.0"

user_personas:
  - name: "Python web developers building analytics backends"
    skill_level: "advanced"
    assumed_knowledge:
      - "Python"
      - "Web frameworks (Django/FastAPI)"
      - "SQL"
      - "Relational databases"
      - "ORMs (Django ORM/SQLAlchemy)"
      - "Virtual environments"
      - "pip/uv"
      - "Type hints"
      - "Async patterns"
    never_assume:
      - "Semantic views"
      - "Semantic layer concepts"
      - "How Snowflake semantic views and Databricks metric views differ from regular views"
      - "AGG vs MEASURE syntax"
      - "The relationship between metrics/dimensions and SQL columns"
    domain_context: "Web application backends serving analytics/BI dashboards"
    discovery_story: "Searching for a Python library to query their warehouse's semantic layer, or recommended by a data engineering colleague"
    user_tasks:
      - "Define SemanticView models"
      - "Build queries with the fluent API"
      - "Filter and order results"
      - "Connect to Snowflake or Databricks"
      - "Configure connections via TOML"
      - "Generate models from existing warehouse views"
  - name: "Data engineers exposing semantic layers via APIs"
    skill_level: "intermediate"
    assumed_knowledge:
      - "Python"
      - "SQL"
      - "Data warehouses (Snowflake/Databricks)"
      - "Semantic layer concepts (metrics, dimensions, semantic views)"
      - "ETL/ELT pipelines"
      - "TOML/YAML configuration"
    never_assume:
      - "Web framework patterns"
      - "REST API design"
      - "How to structure query endpoints"
      - "Python packaging (extras, optional deps)"
      - "Connection pooling concepts"
      - "ORM-style patterns (metaclasses, descriptors, fluent builders)"
    domain_context: "Data platform teams bridging warehouse semantic layers to frontend applications"
    discovery_story: "Already owns the semantic layer in the warehouse, searching for tooling to serve it to the frontend team without writing raw SQL endpoints"
    user_tasks:
      - "Configure warehouse connections via TOML"
      - "Generate models from existing semantic views using codegen CLI"
      - "Build query endpoints for the frontend team"
      - "Set up connection pools for production use"

tone: "warm-businesslike"

use_cases:
  - title: "Build analytics app backends from semantic views"
    problem: "No typed, Pythonic way to query semantic views from Python application code"
    capability: "Typed Python models mapping to warehouse semantic views, fluent query builder with IDE autocomplete, backend-agnostic execution"
    outcome: "Clean, maintainable Python backend querying semantic layer data with type-safe models, filter predicates, and Arrow-native results"

use_cases_section: false

doc_system: "sphinx-shibuya"
api_reference: "sphinx-autoapi"

paths:
  docs_root: "docs/src/"
  source_root: "src/"

detected:
  language: "python"
  doc_system: "sphinx-shibuya"
  existing_docs: true

qa_answers:
  navigation: "Sections as top tabs"
  api_docs: "sphinx-autoapi"
  features:
    - "Grids + cards"
    - "Tab sets"
    - "Dropdowns"
    - "Badges + buttons"
